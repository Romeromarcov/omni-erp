[mypy]
# Tipado gradual con django-stubs (resuelve los atributos dinámicos de modelos/
# managers de Django). Plan cero-dudas Fase 5: mypy bloqueante en módulos de dinero.
plugins = mypy_django_plugin.main, mypy_drf_plugin.main
ignore_missing_imports = True
exclude = (^|/)(migrations|tests_api|tests|pruebas_funcionales)/

[mypy.plugins.django-stubs]
django_settings_module = config.settings

# ── Overrides por límites conocidos de django-stubs / drf-stubs (no son bugs) ──
# Las tools MCP reciben ids como str y los pasan a lookups de FK (UUID); Django los
# acepta en runtime, pero django-stubs lo marca [misc]. Falso positivo acotado.
[mypy-apps.core.mcp_server]
disable_error_code = misc

[mypy-apps.finanzas.mcp]
disable_error_code = misc

# M2M con through/refs que el plugin no infiere ("Need type annotation") y el
# monkeypatch intencional de Model.save (method-assign) en este módulo.
[mypy-apps.finanzas.models]
disable_error_code = var-annotated, method-assign

# drf-stubs no infiere el tipo de StringRelatedField/PrimaryKeyRelatedField(many=True).
[mypy-apps.finanzas.serializers]
disable_error_code = var-annotated

# Patrón Django válido: `func.short_description = "…"` sobre métodos del admin.
[mypy-apps.finanzas.admin]
disable_error_code = attr-defined

[mutmut]
# Mutation testing (plan cero-dudas, Fase 0 → Fase 3). Scope inicial acotado a un
# módulo de cálculo crítico para acotar el tiempo del job nightly; se amplía por
# fases hasta el objetivo de score ≥80% en módulos de dinero.
paths_to_mutate=apps/fiscal/services.py
runner=python -m pytest tests_api/test_property_fiscal.py tests_api/test_m8_fiscal_completo.py -x -q --no-cov
tests_dir=tests_api/
