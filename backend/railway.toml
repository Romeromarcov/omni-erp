# Config-as-code de Railway para el servicio backend.
# Railway lee este archivo desde el Root Directory del servicio (= "backend").
# Fija el builder Dockerfile (en lugar del autodetect RAILPACK) y el healthcheck.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# NO usamos healthcheck HTTP de Railway: settings_prod fuerza SECURE_SSL_REDIRECT,
# por lo que el probe interno (HTTP a healthcheck.railway.app) no devuelve 200 y
# marcaba el deploy como FAILED aunque el contenedor estuviera sano. La salud a
# nivel de contenedor la cubre el HEALTHCHECK del Dockerfile (curl a localhost),
# y el tráfico real entra por el dominio público (sí está en ALLOWED_HOSTS).
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
