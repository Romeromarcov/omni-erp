[pytest]
DJANGO_SETTINGS_MODULE = config.settings
python_files = test_*.py
testpaths = tests_api pruebas_funcionales
# Política de cobertura (ratchet): --cov-fail-under refleja la cobertura
# REAL actual (65%) y solo debe SUBIR conforme se añaden pruebas, nunca
# bajar. Bloquea regresiones sin frenar el desarrollo.
# --cov-report=xml genera coverage.xml para el gate de diff-cover en CI.
addopts = --cov=apps --cov-fail-under=65 --cov-report=term-missing:skip-covered --cov-report=xml
