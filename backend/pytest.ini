[pytest]
DJANGO_SETTINGS_MODULE = config.settings
python_files = test_*.py
# `apps` al final: colecta los tests in-app (test_*.py) que estaban huérfanos
# (integration_hub/tests/, connectors/tasas_ve/tests/) y cualquiera futuro.
testpaths = tests tests_api pruebas_funcionales apps
# Política de cobertura (ratchet): --cov-fail-under refleja la cobertura
# REAL actual y solo debe SUBIR conforme se añaden pruebas, nunca bajar.
# Bloquea regresiones sin frenar el desarrollo. Medido 2026-06-09: 86.35% (3055
# tests) tras el backfill masivo del plan cero-dudas (lote 1: hub, mcp/agentes,
# finanzas, servicio_cliente/asistencia/nomina/gastos/cxc). Objetivo: 90%
# (escalones 65→67→69→70→71→74→86→90).
# --cov-report=xml genera coverage.xml para el gate de diff-cover en CI.
addopts = --cov=apps --cov-fail-under=86 --cov-report=term-missing:skip-covered --cov-report=xml
markers =
    unit: prueba unitaria pura (sin BD)
    integration: prueba de integración con BD (services, @atomic, races)
    tenant: prueba de aislamiento multi-tenant (R-CODE-1)
    contract: prueba de contrato de API (esquema OpenAPI)
    e2e: prueba extremo a extremo de flujo crítico
