[pytest]
DJANGO_SETTINGS_MODULE = config.settings_test
python_files = tests.py test_*.py *_tests.py
# Política de cobertura (ratchet): --cov-fail-under refleja la cobertura
# REAL actual y solo debe SUBIR conforme se añaden pruebas, nunca bajar.
# Bloquea regresiones sin frenar el desarrollo. Valor actual medido: 65%.
addopts = --cov=apps --cov-fail-under=65 --cov-report=term-missing:skip-covered
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
