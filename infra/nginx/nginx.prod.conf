# nginx.prod.conf — Omni ERP producción
#
# Asumiciones:
#   - SSL terminado en el load balancer upstream (Cloudflare, ALB, etc.)
#   - nginx escucha en 80 dentro del contenedor
#   - Para SSL directo: ver comentarios al final del archivo
#
# Rutas:
#   /static/   → archivos estáticos (volumen omni_prod_staticfiles)
#   /media/    → archivos de usuario (servidos por MinIO / S3 directamente)
#   /ws/       → WebSocket → uvicorn (protocolo upgrade)
#   /          → reverse proxy → uvicorn

upstream django {
    server backend:8000;
    keepalive 32;
}

# Límite de tasa global (protección básica; SEC-07 complementa en app layer)
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

server {
    listen 80;
    # M-SEC-6: set a specific server_name in prod — replace with your domain
    # TODO: set specific server_name in prod (M-SEC-6)
    server_name omni-erp.example.com;

    server_tokens off;

    # Tamaño máximo de request (subida de archivos)
    client_max_body_size 50M;

    # Timeouts generosos para respuestas largas (reportes, exports)
    proxy_read_timeout     120s;
    proxy_connect_timeout  10s;
    proxy_send_timeout     60s;

    # Security headers — NEW-INFRA-1 / M-SEC-5 (mirrored from Railway nginx.conf)
    add_header X-Frame-Options         "DENY"                               always;
    add_header X-Content-Type-Options  "nosniff"                            always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"    always;
    add_header Permissions-Policy      "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.railway.app https://api.bcv.org.ve; frame-ancestors 'none';" always;
    # NOTE: Strict-Transport-Security (HSTS) belongs in the SSL server block below.
    #       Do not add HSTS on a plain HTTP listener. Uncomment HSTS in the SSL block
    #       when SSL is reactivated (M-SEC-5).

    # ── Archivos estáticos ────────────────────────────────────────────
    location /static/ {
        alias /static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Rate limiting en login (SEC-07 a nivel nginx) ────────────────
    location = /api/auth/login/ {
        limit_req zone=login burst=3 nodelay;
        limit_req_status 429;

        proxy_pass         http://django;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # ── WebSocket (Django Channels / notificaciones) ──────────────────
    location /ws/ {
        proxy_pass         http://django;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # ── API — rate limiting general ───────────────────────────────────
    location /api/ {
        limit_req zone=api burst=10 nodelay;  # M-SEC-7: tightened from burst=20

        proxy_pass         http://django;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # ── Todo lo demás → Django (SPA fallback / admin) ─────────────────
    location / {
        proxy_pass         http://django;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # ── Health check de nginx (para load balancer) ────────────────────
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}

# ── SSL directo (sin load balancer) ──────────────────────────────────────────
