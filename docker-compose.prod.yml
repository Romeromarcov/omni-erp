# docker-compose.prod.yml — Omni ERP Production
#
# Uso:
#   cp .env.prod.example .env.prod
#   # editar .env.prod con valores reales
#   docker compose -f docker-compose.prod.yml up -d
#
# Diferencias vs docker-compose.yml (dev):
#   - DJANGO_ENV=prod, DEBUG=False, settings_prod.py
#   - Sin bind-mounts de código fuente (imagen inmutable)
#   - Celery concurrency=4 (vs 2 en dev)
#   - Nginx como reverse-proxy + servidor de estáticos
#   - Sin puertos internos expuestos al host (solo nginx 80/443)
#   - Redis con persistencia AOF
#   - Redpanda sin modo dev-container

services:

  # ─────────────────────────────────────────
  # Base de datos — PostgreSQL 17
  # ─────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file: .env.prod
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - omni_prod_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-omni_erp} -d ${DB_NAME:-omni_erp}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    # Sin puerto expuesto al host: solo accesible dentro de la red Docker

  # ─────────────────────────────────────────
  # Cache / broker — Redis 7 (con persistencia AOF)
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
        --appendonly yes
        --appendfsync everysec
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
    volumes:
      - omni_prod_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ─────────────────────────────────────────
  # Backend — Django / uvicorn (producción)
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env.prod
    environment:
      DJANGO_ENV: prod
      DJANGO_SETTINGS_MODULE: config.settings_prod
      DB_HOST: postgres
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      # Volumen compartido con nginx para archivos estáticos
      - omni_prod_staticfiles:/app/staticfiles
    command: >
      python -m uvicorn config.asgi:application
        --host 0.0.0.0
        --port 8000
        --workers 2
        --lifespan on
    # Sin puerto expuesto al host: nginx hace de proxy

  # ─────────────────────────────────────────
  # Celery Worker — procesamiento async
  # ─────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env.prod
    environment:
      DJANGO_ENV: prod
      DJANGO_SETTINGS_MODULE: config.settings_prod
      DB_HOST: postgres
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      python -m celery -A config worker
        --loglevel=info
        --concurrency=4
        --queues=celery,auditoria,notifications
        --hostname=worker@%h
    # Entrypoint omitido: Celery no necesita migrate ni collectstatic
    entrypoint: []

  # ─────────────────────────────────────────
  # Celery Beat — scheduler de tareas periódicas
  # ─────────────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env.prod
    environment:
      DJANGO_ENV: prod
      DJANGO_SETTINGS_MODULE: config.settings_prod
      DB_HOST: postgres
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      python -m celery -A config beat
        --loglevel=info
        --scheduler django_celery_beat.schedulers:DatabaseScheduler
    entrypoint: []

  # ─────────────────────────────────────────
  # Nginx — reverse proxy + estáticos
  # ─────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./infra/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - omni_prod_staticfiles:/static:ro
      # Para SSL: montar certificados aquí
      # - ./infra/nginx/certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      # Descomentar cuando tengas certificados SSL:
      # - "443:443"

  # ─────────────────────────────────────────
  # Object Storage — MinIO (S3-compatible)
  # ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file: .env.prod
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - omni_prod_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    # Consola de administración solo accesible por túnel / VPN
    # No exponer 9001 en producción sin autenticación adicional

  minio_init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    env_file: .env.prod
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${S3_ACCESS_KEY} $${S3_SECRET_KEY} &&
        mc mb --ignore-existing local/$${S3_BUCKET_NAME:-omni-erp} &&
        mc anonymous set none local/$${S3_BUCKET_NAME:-omni-erp} &&
        echo 'MinIO bucket listo.'
      "
    restart: on-failure

  # ─────────────────────────────────────────
  # Event Store — Redpanda (Kafka-compatible)
  # ─────────────────────────────────────────
  redpanda:
    image: redpandadata/redpanda:v24.3.1
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --smp 1
      - --memory 512M
      # Sin --mode dev-container en producción: usa modo normal con FSM
      - --default-log-level=info
    volumes:
      - omni_prod_redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 45s

volumes:
  omni_prod_db_data:
    name: omni_prod_db_data
  omni_prod_redis_data:
    name: omni_prod_redis_data
  omni_prod_staticfiles:
    name: omni_prod_staticfiles
  omni_prod_minio_data:
    name: omni_prod_minio_data
  omni_prod_redpanda_data:
    name: omni_prod_redpanda_data
