# docker-compose.prod.yml — Omni ERP Production
#
# Uso:
#   cp .env.prod.example .env.prod
#   # editar .env.prod con valores reales
#   docker compose -f docker-compose.prod.yml up -d
#
# Diferencias vs docker-compose.yml (dev):
#   - DJANGO_ENV=prod, DEBUG=False, settings_prod.py
#   - Sin bind-mounts de código fuente (imagen inmutable)
#   - Celery concurrency=4 (vs 2 en dev)
#   - Nginx como reverse-proxy + servidor de estáticos
#   - Sin puertos internos expuestos al host (solo nginx 80/443)
#   - Redis con persistencia AOF
#   - Redpanda sin modo dev-container

services:

  # ─────────────────────────────────────────
  # Base de datos — PostgreSQL 17
  # ─────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file: .env.prod
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - omni_prod_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-omni_erp} -d ${DB_NAME:-omni_erp}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    # Sin puerto expuesto al host: solo accesible dentro de la red Docker

  # ─────────────────────────────────────────
  # Backup PostgreSQL — sidecar diario (INFRA-NEW-6 / GAP-4)
  # ─────────────────────────────────────────
  # Ejecuta infra/backup/pg_dump_omni.sh una vez al día (loop con sleep 24h).
  # En Railway el backup lo hace .github/workflows/backup.yml (GAP-4-bis); este
  # sidecar cubre la topología self-hosted para que el backup corra solo.
  # Usa postgres:17-alpine para que pg_dump coincida con la versión del servidor.
  backup:
    image: postgres:17-alpine
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env.prod
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      PGPASSWORD: ${DB_PASSWORD}
      BACKUP_OUT_DIR: /backups
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
    volumes:
      - ./infra/backup:/opt/backup:ro
      - omni_prod_db_backups:/backups
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "[backup] sidecar iniciado; backup diario a /backups (retención ${BACKUP_RETENTION_DAYS:-30}d)";
        while true; do
          sh /opt/backup/pg_dump_omni.sh || echo "[backup] fallo en el ciclo, se reintenta mañana";
          sleep 86400;
        done

  # ─────────────────────────────────────────
  # Cache / broker — Redis 7 (con persistencia AOF)
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
        --appendonly yes
        --appendfsync everysec
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
    volumes:
      - omni_prod_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ─────────────────────────────────────────
  # Backend — Django / uvicorn (producción)
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env.prod
    environment:
      DJANGO_ENV: prod
      DJANGO_SETTINGS_MODULE: config.settings_prod
      DB_HOST: postgres
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      # Volumen compartido con nginx para archivos estáticos
      - omni_prod_staticfiles:/app/staticfiles
    command: >
      python -m uvicorn config.asgi:application
        --host 0.0.0.0
        --port 8000
        --workers 2
        --lifespan on
    # Sin puerto expuesto al host: nginx hace de proxy

  # ─────────────────────────────────────────
  # Celery Worker — procesamiento async
  # ─────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env.prod
    environment:
      DJANGO_ENV: prod
      DJANGO_SETTINGS_MODULE: config.settings_prod
      DB_HOST: postgres
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      python -m celery -A config worker
        --loglevel=info
        --concurrency=4
        --queues=celery,auditoria,notifications
        --hostname=worker@%h
    # Entrypoint omitido: Celery no necesita migrate ni collectstatic
    entrypoint: []
    # El HEALTHCHECK del Dockerfile (curl :8000) es para el web server; celery
    # no sirve HTTP. Se sobreescribe con un ping de celery.
    healthcheck:
      test: ["CMD-SHELL", "python -m celery -A config inspect ping || exit 1"]
      interval: 30s
      timeout: 15s
      start_period: 45s
      retries: 3

  # ─────────────────────────────────────────
  # Celery Beat — scheduler de tareas periódicas
  # ─────────────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env.prod
    environment:
      DJANGO_ENV: prod
      DJANGO_SETTINGS_MODULE: config.settings_prod
      DB_HOST: postgres
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      python -m celery -A config beat
        --loglevel=info
        --scheduler django_celery_beat.schedulers:DatabaseScheduler
    entrypoint: []
    # Beat es scheduler sin endpoint HTTP/ping; el HEALTHCHECK web del Dockerfile
    # no aplica. Se deshabilita para no reportar falso unhealthy.
    healthcheck:
      disable: true

  # ─────────────────────────────────────────
  # Nginx — reverse proxy + estáticos
  # ─────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./infra/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - omni_prod_staticfiles:/static:ro
      # Para SSL: montar certificados aquí
      # - ./infra/nginx/certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      # Descomentar cuando tengas certificados SSL:
      # - "443:443"

  # ─────────────────────────────────────────
  # SSL — Let's Encrypt (GAP-5, DIFERIDO a fase self-hosted)
  # Railway termina TLS upstream, así que esto solo aplica en self-hosted.
  # Para activar: 1) descomentar este sidecar y los volúmenes letsencrypt;
  # 2) montar ./infra/nginx/certs y descomentar el bloque server 443 + HSTS en
  #    infra/nginx/nginx.prod.conf; 3) exponer 443 en nginx (arriba);
  # 4) definir LETSENCRYPT_EMAIL y LETSENCRYPT_DOMAIN en .env.
  # certbot:
  #   image: certbot/certbot:latest
  #   restart: unless-stopped
  #   volumes:
  #     - ./infra/nginx/certs:/etc/letsencrypt
  #     - omni_certbot_webroot:/var/www/certbot
  #   # Renovación automática cada 12h (certbot renueva si faltan <30 días).
  #   entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done'
  #   environment:
  #     LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
  #     LETSENCRYPT_DOMAIN: ${LETSENCRYPT_DOMAIN}

  # ─────────────────────────────────────────
  # Object Storage — MinIO (S3-compatible)
  # ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file: .env.prod
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - omni_prod_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    # Consola de administración solo accesible por túnel / VPN
    # No exponer 9001 en producción sin autenticación adicional

  minio_init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    env_file: .env.prod
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${S3_ACCESS_KEY} $${S3_SECRET_KEY} &&
        mc mb --ignore-existing local/$${S3_BUCKET_NAME:-omni-erp} &&
        mc anonymous set none local/$${S3_BUCKET_NAME:-omni-erp} &&
        echo 'MinIO bucket listo.'
      "
    restart: on-failure

  # ─────────────────────────────────────────
  # Event Store — Redpanda (Kafka-compatible)
  # ─────────────────────────────────────────
  redpanda:
    image: redpandadata/redpanda:v24.3.1
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --smp 1
      - --memory 512M
      # Sin --mode dev-container en producción: usa modo normal con FSM
      - --default-log-level=info
    volumes:
      - omni_prod_redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 45s

volumes:
  # GAP-5: descomentar junto con el sidecar certbot (SSL self-hosted).
  # omni_certbot_webroot:
  #   name: omni_certbot_webroot
  omni_prod_db_data:
    name: omni_prod_db_data
  omni_prod_db_backups:
    name: omni_prod_db_backups
  omni_prod_redis_data:
    name: omni_prod_redis_data
  omni_prod_staticfiles:
    name: omni_prod_staticfiles
  omni_prod_minio_data:
    name: omni_prod_minio_data
  omni_prod_redpanda_data:
    name: omni_prod_redpanda_data
