[flake8]
# Configuraciớn compatible con Black
max-line-length = 119
extend-ignore =
    # E203: whitespace before ':' — Black la necesita
    E203,
    # W503: line break before binary operator — style debate
    W503,
    # E501: line too long — manejado por Black
    E501,
    # W504: line break after binary operator
    W504,
per-file-ignores =
    # Archivos de configuración y entrypoints
    */settings_*.py: F401,
    */config/__init__.py: F401,
    */conftest.py: F401,
    # Tests pueden usar assert con expresiones
    tests/**/*.py: S101,
exclude =
    .git,
    .venv,
    venv,
    __pycache__,
    */migrations/*,
    node_modules,
    dist,
    build,
    .eggs

[isort]
profile = black
line_length = 119
known_django = django, rest_framework, drf_yasg
known_third_party = celery, boto3, jwt, psycopg2
known_first_party = apps, config
sections = FUTURE, STDLIB, THIRDPARTY, DJANGO, FIRSTPARTY, LOCALFOLDER
skip_glob = */migrations/*

[tool:pytest]
DJANGO_SETTINGS_MODULE = config.settings_test
python_files = test_*.py
python_classes = Test*
python_functions = test_*
