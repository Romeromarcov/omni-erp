server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compresión
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # SPA fallback: cualquier ruta que no sea un archivo real sirve index.html
    # (necesario para el routing de React — recargar /pedidos no debe dar 404)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets con hash en el nombre → cache agresivo
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # No cachear el index.html (para que tome nuevas versiones del build)
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
