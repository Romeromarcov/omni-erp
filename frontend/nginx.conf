server {
    listen 8080;
    server_name _;

    server_tokens off;

    # Security headers (NEW-INFRA-1 / M-SEC-5)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.railway.app https://api.bcv.org.ve; frame-ancestors 'none';" always;

    root /usr/share/nginx/html;
    index index.html;

    # Compresión
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # SPA fallback: cualquier ruta que no sea un archivo real sirve index.html
    # (necesario para el routing de React — recargar /pedidos no debe dar 404)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets con hash en el nombre → cache agresivo
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # No cachear el index.html (para que tome nuevas versiones del build)
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
