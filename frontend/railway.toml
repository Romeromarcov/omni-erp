# Config-as-code de Railway para el servicio frontend.
# Railway lee este archivo desde el Root Directory del servicio (= "frontend").
# Fuerza el build de producción (nginx, Dockerfile.prod) en vez del Dockerfile
# de desarrollo (Vite dev server). nginx escucha en el puerto 8080.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.prod"

[deploy]
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
