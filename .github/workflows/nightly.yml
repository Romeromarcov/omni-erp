name: Nightly

# Jobs lentos que no deben correr en cada PR (plan cero-dudas, Fase 0 → Fase 3).
on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC diario
  workflow_dispatch: {}

jobs:
  # ──────────────────────────────────────────────────────────────
  # Mutation testing (mutmut) — MATRIX por módulo de cálculo puro.
  #
  # mutmut usa UN runner por corrida, así que la mutación por-módulo se hace con
  # una entrada de matrix por archivo, cada una con su runner rápido (test unit
  # puro y determinista). Se apunta a la lógica de CÁLCULO (no a la orquestación
  # ORM, que es lenta de mutar y de bajo valor). No-bloqueante: reporta el score;
  # el objetivo ≥80% se endurece en Fase 3.
  # ──────────────────────────────────────────────────────────────
  mutation:
    name: "Mutation (${{ matrix.nombre }})"
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - nombre: "fiscal"
            paths: "apps/fiscal/services.py"
            runner: "python -m pytest tests/unit/test_fiscal_calculos.py -x -q --no-cov -p no:cacheprovider"
          - nombre: "nomina_lottt"
            paths: "apps/nomina/calculo_lottt.py"
            runner: "python -m pytest tests_api/test_nomina_lottt.py -x -q --no-cov -p no:cacheprovider"
          - nombre: "cxc_scoring"
            paths: "apps/cuentas_por_cobrar/services_scoring.py"
            runner: "python -m pytest tests/unit/test_cxc_calculos.py -x -q --no-cov -p no:cacheprovider"
          - nombre: "cxc_aging"
            paths: "apps/cuentas_por_cobrar/services_aging.py"
            runner: "python -m pytest tests/unit/test_cxc_calculos.py -x -q --no-cov -p no:cacheprovider"
    env:
      DJANGO_ENV: dev
      SECRET_KEY: "ci-only-dummy-key-not-used-in-prod-xK9mPqR2nL8vJ4wY"
      # Los runners son unit puros (sin BD); declaramos las vars solo para que
      # config.settings importe sin fallar.
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_NAME: omni_erp
      DB_USER: omni_erp
      DB_PASSWORD: omni_erp_ci
      REDIS_URL: "redis://localhost:6379/0"
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install deps
        working-directory: backend
        run: pip install -r requirements-dev.txt
      - name: "Mutmut — ${{ matrix.nombre }}"
        working-directory: backend
        # No-bloqueante; reporta el score del módulo.
        run: |
          mutmut run \
            --paths-to-mutate="${{ matrix.paths }}" \
            --runner="${{ matrix.runner }}" \
            --no-progress || true
          echo "===== Resultados ${{ matrix.nombre }} ====="
          mutmut results || true
