# Plan B (apps multiplataforma) — Empaquetado de shells nativos.
#
# Genera los binarios distribuibles de Omni a partir de la MISMA base web:
#   - Windows: instalador NSIS + portable (.exe) vía Electron + electron-builder.
#   - Android: .apk debug (instalable directo) y, si hay keystore en secrets,
#     .apk release firmado + .aab para Play Store, vía Capacitor + Gradle.
#
# Disparo manual (workflow_dispatch) o al taguear `app-v*`. Los binarios se
# publican como artefactos del run (90 días); un tag además crea un Release.
#
# Firma:
#   - Windows: sin certificado Authenticode los .exe van SIN firmar (SmartScreen
#     avisará). Cuando exista cert EV: añadir CSC_LINK / CSC_KEY_PASSWORD.
#   - Android: secrets opcionales ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD,
#     ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD. Sin ellos solo se genera el debug.
name: Package — apps nativas (Windows + Android)

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: "URL del backend (VITE_API_URL) embebida en el build"
        required: false
        default: "https://omni-erp-backend-production.up.railway.app/api"
  push:
    tags:
      - "app-v*"

concurrency:
  group: package-${{ github.ref }}
  cancel-in-progress: true

env:
  VITE_API_URL: ${{ github.event.inputs.api_url || 'https://omni-erp-backend-production.up.railway.app/api' }}

jobs:
  windows:
    name: "Windows (.exe NSIS + portable)"
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: frontend
        run: npm ci

      - name: Build Electron (NSIS + portable)
        working-directory: frontend
        env:
          # Sin cert de firma: electron-builder no debe intentar auto-descubrir uno.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run electron:build

      - name: Publicar artefactos
        uses: actions/upload-artifact@v4
        with:
          name: omni-erp-windows
          path: frontend/release/*.exe
          if-no-files-found: error
          retention-days: 90

  android:
    name: "Android (.apk debug + release firmado si hay keystore)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar dependencias
        working-directory: frontend
        run: npm ci

      - name: Build web nativo (hash router + base relativa)
        working-directory: frontend
        run: npm run build:native

      - name: Generar proyecto Android (Capacitor)
        working-directory: frontend
        run: |
          npx cap add android
          npx cap sync android
          npm run cap:patch:android

      - name: Build APK debug
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon

      - name: ¿Hay keystore para firmar release?
        id: keystore
        env:
          KS: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KS" ]; then echo "sign=true" >> "$GITHUB_OUTPUT"; else
            echo "sign=false" >> "$GITHUB_OUTPUT"
            echo "Sin ANDROID_KEYSTORE_BASE64 — solo se publica el APK debug."
          fi

      - name: Build release firmado (.apk + .aab)
        if: steps.keystore.outputs.sign == 'true'
        working-directory: frontend/android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > /tmp/omni-release.keystore
          ./gradlew assembleRelease bundleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=/tmp/omni-release.keystore \
            -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"
          rm -f /tmp/omni-release.keystore

      - name: Publicar artefactos
        uses: actions/upload-artifact@v4
        with:
          name: omni-erp-android
          path: |
            frontend/android/app/build/outputs/apk/debug/*.apk
            frontend/android/app/build/outputs/apk/release/*.apk
            frontend/android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 90

  release:
    name: "GitHub Release (solo tags app-v*)"
    if: startsWith(github.ref, 'refs/tags/app-v')
    needs: [windows, android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Descargar artefactos
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Crear release con binarios
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            artifacts/omni-erp-windows/*
            artifacts/omni-erp-android/**/*.apk
            artifacts/omni-erp-android/**/*.aab
