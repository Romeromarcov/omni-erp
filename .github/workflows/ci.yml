name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Cancela runs anteriores del mismo branch/PR si llega uno nuevo
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────
  # Backend — Django check + pytest contra PostgreSQL real
  # ──────────────────────────────────────────────────────────────
  backend:
    name: "Backend (Django + pytest)"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: omni_erp
          POSTGRES_USER: omni_erp
          POSTGRES_PASSWORD: omni_erp_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Variables de entorno para todos los steps del job
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_NAME: omni_erp
      DB_USER: omni_erp
      DB_PASSWORD: omni_erp_ci
      DJANGO_ENV: dev
      # SECRET_KEY de CI: no es un secreto real, solo satisface el
      # requerimiento de Django. No se usa en ningún contexto de producción.
      SECRET_KEY: "ci-only-dummy-key-not-used-in-prod-xK9mPqR2nL8vJ4wY"
      # Celery: los tests usan ALWAYS_EAGER (sin broker real),
      # pero settings necesita una URL válida.
      REDIS_URL: "redis://localhost:6379/0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # diff-cover necesita el historial para comparar con main

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        # requirements-dev incluye -r requirements.txt + el tooling de test
        # (factory_boy, hypothesis, pytest-xdist, diff-cover) necesario para la suite.
        run: pip install -r requirements-dev.txt

      - name: Django system check
        working-directory: backend
        run: python manage.py check

      - name: Migraciones sin drift (NEW-MIG-1)
        working-directory: backend
        run: python manage.py makemigrations --check --dry-run

      - name: Matrices A1 al día (mapa de superficie)
        working-directory: backend
        run: python manage.py mapa_superficie --check

      - name: Run tests
        working-directory: backend
        run: python -m pytest tests tests_api/ -v --tb=short --no-header

      - name: Diff coverage — código nuevo ≥90% (cero-dudas, BLOQUEANTE)
        if: github.event_name == 'pull_request'
        working-directory: backend
        # BLOQUEANTE: cada PR debe cubrir ≥90% de sus líneas nuevas de apps/.
        # El gate ya está mergeado a main, así que compara solo las líneas nuevas
        # del PR contra el main ya cubierto. (Objetivo plan: subir a 95%.)
        run: |
          pip install diff-cover
          git fetch --no-tags origin main
          diff-cover coverage.xml --compare-branch=origin/main --fail-under=90

  # ──────────────────────────────────────────────────────────────
  # Frontend — TypeScript + ESLint
  # ──────────────────────────────────────────────────────────────
  frontend:
    name: "Frontend (tsc + eslint)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript check (build mode — coincide con el build de producción)
        working-directory: frontend
        # tsc -b usa tsconfig.app.json (igual que `npm run build`), evitando que
        # errores de build pasen el gate de CI como ocurría con --noEmit.
        run: npx tsc -b

      - name: ESLint
        working-directory: frontend
        run: npm run lint

      - name: Vitest unit tests (con gate de cobertura ≥60% — INFRA-NEW-3)
        working-directory: frontend
        run: npm run test:coverage -- --run

  # ──────────────────────────────────────────────────────────────
  # Agent eval — Shadow mode quality gate (CTF-003)
  # Corre siempre en main/PR; filtra por paths para no bloquear
  # branches sin cambios en agentes.
  # Criterio de cierre: precision@1 >= 80% en reorden y cobranza.
  # ──────────────────────────────────────────────────────────────
  agent-eval:
    name: "Agent Eval — precision@1 ≥ 80% (CTF-003)"
    runs-on: ubuntu-latest

    # Sin postgres: los agentes usan fallback determinístico (sin BD).
    # Si en el futuro se agrega persistencia, añadir el service aquí.

    env:
      DJANGO_ENV: dev
      SECRET_KEY: "ci-only-dummy-key-not-used-in-prod-xK9mPqR2nL8vJ4wY"
      # Sin BD real: los eval tests no tocan la base de datos.
      # Declaramos las vars para que Django settings no falle al importar.
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_NAME: omni_erp
      DB_USER: omni_erp
      DB_PASSWORD: omni_erp_ci
      REDIS_URL: "redis://localhost:6379/0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run eval suite (no-cov — umbral es precisión, no cobertura)
        working-directory: backend
        run: |
          python -m pytest tests_eval/ -v --tb=short --no-header \
            --no-cov
        # Criterio CTF-003: >= 80% precision@1 en reorden y cobranza.
        # El umbral se verifica dentro de los tests mismos
        # (test_precision_global / test_precision_global_prioridad /
        #  test_precision_global_canal). Si alguno falla, el job falla.

  # ──────────────────────────────────────────────────────────────
  # Security scan — INFRA-NEW-4: secret scanning + dependency audit
  # ──────────────────────────────────────────────────────────────
  security-scan:
    name: "Security scan (gitleaks + deps audit)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks necesita el historial completo

      - name: Secret scanning (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dependency audit (Python — pip-audit)
        working-directory: backend
        # No bloqueante: reporta vulnerabilidades conocidas sin tumbar el pipeline
        # ante un CVE recién publicado; el equipo prioriza y remedia.
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt || true

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Dependency audit (Node — npm audit)
        working-directory: frontend
        continue-on-error: true
        run: npm audit --audit-level=high || true

      - name: Trivy — CVEs de dependencias e imágenes (fs scan)
        # Instalación vía script oficial (evita depender de tags de la action).
        # Reporta; escalar a bloqueante (CRITICAL) tras cerrar los CVEs major.
        continue-on-error: true
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          trivy fs --scanners vuln --severity HIGH,CRITICAL --ignore-unfixed --no-progress . || true

  # ──────────────────────────────────────────────────────────────
  # Static analysis — plan "cero dudas" Fase 0/1
  # bandit (seguridad) bloqueante en MEDIUM+; ruff (lint); mypy (tipos, gradual)
  # ──────────────────────────────────────────────────────────────
  static-analysis:
    name: "Static analysis (bandit + semgrep + ruff + mypy)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev tooling
        working-directory: backend
        run: pip install bandit==1.9.4 ruff==0.8.4 mypy==1.13.0 semgrep==1.97.0

      - name: Bandit (seguridad estática — bloqueante en MEDIUM+)
        working-directory: backend
        run: bandit -r apps/ config/ -c .bandit.yaml --severity-level medium

      - name: Semgrep (OWASP/Django + reglas Omni — bloqueante en severidad ERROR)
        working-directory: backend
        # ../.semgrep.yml: reglas propias (raw SQL, verify=False, eval/exec, shell=True),
        # verificadas limpias (0 findings sobre 616 archivos) → bloqueantes.
        run: semgrep --config p/python --config p/django --config ../.semgrep.yml --severity ERROR --error apps/ config/

      - name: Ruff (bugs reales — BLOQUEANTE)
        working-directory: backend
        # Códigos que indican bugs, no estilo: sintaxis (E9), f-strings rotos (F63),
        # comparaciones inválidas (F7), nombres indefinidos (F82), uso antes de
        # asignación (F823) y redefiniciones (F811 — clases/funciones/imports
        # duplicados, como los serializers/ViewSet de finanzas en BUG-DUP-1). Este
        # subconjunto está limpio y bloquea para impedir regresiones.
        run: ruff check apps/ config/ --select E9,F63,F7,F82,F823,F811

      - name: Ruff (limpieza gradual — no bloqueante aún)
        working-directory: backend
        # F401 (imports sin usar): se limpia por fases; al quedar en cero, moverlo
        # al paso bloqueante de arriba.
        continue-on-error: true
        run: ruff check apps/ config/ --select F401

      - name: Mypy (tipos — gradual, no bloqueante aún)
        working-directory: backend
        continue-on-error: true
        run: |
          pip install -r requirements.txt
          mypy apps/contabilidad apps/finanzas apps/nomina apps/manufactura --ignore-missing-imports || true

  # ──────────────────────────────────────────────────────────────
  # Contract — OpenAPI (drf-yasg) + schemathesis. No-bloqueante al inicio
  # (Fase 0): genera el esquema y hace fuzzing de contrato contra un server vivo.
  # ──────────────────────────────────────────────────────────────
  contract:
    name: "Contract (OpenAPI + schemathesis)"
    runs-on: ubuntu-latest
    continue-on-error: true  # no-bloqueante al inicio (DoD A0)
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: omni_erp
          POSTGRES_USER: omni_erp
          POSTGRES_PASSWORD: omni_erp_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_NAME: omni_erp
      DB_USER: omni_erp
      DB_PASSWORD: omni_erp_ci
      DJANGO_ENV: dev
      SECRET_KEY: "ci-only-dummy-key-not-used-in-prod-xK9mPqR2nL8vJ4wY"
      REDIS_URL: "redis://localhost:6379/0"
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install deps
        working-directory: backend
        run: pip install -r requirements-dev.txt
      - name: Migrar
        working-directory: backend
        run: python manage.py migrate --noinput
      - name: Generar esquema OpenAPI (drf-yasg)
        working-directory: backend
        run: python manage.py generate_swagger /tmp/openapi.json -f json
      - name: Levantar servidor
        working-directory: backend
        run: |
          python manage.py runserver 0.0.0.0:8000 &
          for i in $(seq 1 30); do curl -sf http://localhost:8000/api/health/ >/dev/null && break || sleep 2; done
      - name: Schemathesis (fuzzing de contrato — no-bloqueante)
        working-directory: backend
        run: |
          schemathesis run /tmp/openapi.json --base-url http://localhost:8000 \
            --checks not_a_server_error --hypothesis-max-examples=5 || true
