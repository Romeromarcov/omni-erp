name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Cancela runs anteriores del mismo branch/PR si llega uno nuevo
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────
  # Backend — Django check + pytest contra PostgreSQL real
  # ──────────────────────────────────────────────────────────────
  backend:
    name: "Backend (Django + pytest)"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: omni_erp
          POSTGRES_USER: omni_erp
          POSTGRES_PASSWORD: omni_erp_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Variables de entorno para todos los steps del job
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_NAME: omni_erp
      DB_USER: omni_erp
      DB_PASSWORD: omni_erp_ci
      DJANGO_ENV: dev
      # SECRET_KEY de CI: no es un secreto real, solo satisface el
      # requerimiento de Django. No se usa en ningún contexto de producción.
      SECRET_KEY: "ci-only-dummy-key-not-used-in-prod-xK9mPqR2nL8vJ4wY"
      # Celery: los tests usan ALWAYS_EAGER (sin broker real),
      # pero settings necesita una URL válida.
      REDIS_URL: "redis://localhost:6379/0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # diff-cover necesita el historial para comparar con main

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        # requirements-dev incluye -r requirements.txt + el tooling de test
        # (factory_boy, hypothesis, pytest-xdist, diff-cover) necesario para la suite.
        run: pip install -r requirements-dev.txt

      - name: Django system check
        working-directory: backend
        run: python manage.py check

      - name: Migraciones sin drift (NEW-MIG-1)
        working-directory: backend
        run: python manage.py makemigrations --check --dry-run

      - name: Matrices A1 al día (mapa de superficie)
        working-directory: backend
        run: python manage.py mapa_superficie --check

      - name: Run tests
        working-directory: backend
        run: python -m pytest tests tests_api/ -v --tb=short --no-header

      - name: Diff coverage — código nuevo ≥95% (cero-dudas, BLOQUEANTE)
        working-directory: backend
        # BLOQUEANTE: todo lo nuevo vs main debe cubrir ≥95% de sus líneas de
        # apps/ (plan cero-dudas, criterio 2). Corre en TODOS los eventos, no
        # solo pull_request: `on.pull_request` filtra por base=main, así que los
        # PRs a develop solo generan runs de push — con el `if` anterior el gate
        # se saltaba silenciosamente en cada merge a develop y la deuda se
        # acumuló hasta reventar en el PR de release (#100, 91% agregado).
        # En push a main el diff vs origin/main queda vacío y pasa trivialmente.
        run: |
          pip install diff-cover
          git fetch --no-tags origin main
          diff-cover coverage.xml --compare-branch=origin/main --fail-under=95

  # ──────────────────────────────────────────────────────────────
  # Frontend — TypeScript + ESLint
  # ──────────────────────────────────────────────────────────────
  frontend:
    name: "Frontend (tsc + eslint)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: npm audit (high+) — BLOQUEANTE (gate activado al cerrar CTF-007)
        working-directory: frontend
        # Sin --omit=dev a propósito: el único HIGH que existió (picomatch,
        # CTF-007) venía de devDependencies, y omitirlas habría ocultado justo
        # el hallazgo que el CTF rastreaba. El toolchain de build/lint corre en
        # CI y en máquinas de desarrollo: también es superficie de supply-chain.
        run: npm audit --audit-level=high

      - name: TypeScript check (build mode — coincide con el build de producción)
        working-directory: frontend
        # tsc -b usa tsconfig.app.json (igual que `npm run build`), evitando que
        # errores de build pasen el gate de CI como ocurría con --noEmit.
        run: npx tsc -b

      - name: ESLint
        working-directory: frontend
        run: npm run lint

      - name: Drift de contrato API (TEST-6 — BLOQUEANTE)
        working-directory: frontend
        # Regenera los tipos TS desde el esquema OpenAPI versionado
        # (src/api/openapi.json) y falla si difieren de src/api/schema.d.ts.
        # Garantiza que los tipos del frontend siguen el contrato del backend.
        run: npm run check:api-drift

      - name: Vitest unit tests (con gate de cobertura ≥60% — INFRA-NEW-3)
        working-directory: frontend
        run: npm run test:coverage -- --run

  # ──────────────────────────────────────────────────────────────
  # E2E — Playwright flujos críticos (TEST-6 / Fase 4). NO-BLOQUEANTE:
  # requiere backend + frontend vivos; se ejecuta aparte del job unit.
  # Cubre: venta (pedido→confirmar→stock/CxC), abono CxC, caja (pago→
  # movimiento; sustituye compras, que es API-only), ajuste de inventario
  # +kardex, y login multi-empresa. BLOQUEANTE desde Fase 5 (cero-dudas).
  # ──────────────────────────────────────────────────────────────
  e2e:
    name: "E2E (Playwright flujos críticos — BLOQUEANTE)"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: omni_erp
          POSTGRES_USER: omni_erp
          POSTGRES_PASSWORD: omni_erp_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      # P2-4: el backend vivo usa Redis real para CACHES (DB 1) — sin este
      # service, rate-limit/throttle (cache compartido) darían 500 al conectar.
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_NAME: omni_erp
      DB_USER: omni_erp
      DB_PASSWORD: omni_erp_ci
      DJANGO_ENV: dev
      SECRET_KEY: "ci-only-dummy-key-not-used-in-prod-xK9mPqR2nL8vJ4wY"
      # Broker Celery (DB 0) y CACHES de Django (REDIS_CACHE_DB, default 1) —
      # mismo layout que Railway. El service redis de arriba la respalda.
      REDIS_URL: "redis://localhost:6379/0"
      E2E_BASE_URL: "http://localhost:4173"
      # Credencial CI-only del admin del seed E2E (no es un secreto de prod;
      # mismo criterio que el SECRET_KEY dummy de arriba).
      E2E_ADMIN_PASSWORD: "ci-only-E2e-Admin-2026!"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Migrar
        working-directory: backend
        run: python manage.py migrate --noinput

      - name: Seed E2E (2 empresas + admin multi-empresa)
        working-directory: backend
        env:
          OMNI_SEED_ADMIN_PASSWORD: ${{ env.E2E_ADMIN_PASSWORD }}
        run: |
          python manage.py seed_empresa_inicial --nombre-legal "Empresa E2E Uno C.A." --rif "J-11111111-1" \
            --admin-username admin_e2e --admin-email admin.e2e@example.com
          python manage.py seed_empresa_inicial --nombre-legal "Empresa E2E Dos C.A." --rif "J-22222222-2" \
            --admin-username admin_e2e --admin-email admin.e2e@example.com

      - name: Levantar backend
        working-directory: backend
        run: |
          python manage.py runserver 0.0.0.0:8000 &
          for i in $(seq 1 30); do curl -sf http://localhost:8000/api/health/ >/dev/null && break || sleep 2; done

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build + servir frontend
        working-directory: frontend
        env:
          # El preview server (vite preview) sirve en :4173 y proxya /api al backend.
          BACKEND_URL: "http://localhost:8000"
          VITE_API_URL: "http://localhost:8000/api"
        run: |
          npm run build
          npm run preview -- --host 0.0.0.0 --port 4173 &
          for i in $(seq 1 30); do curl -sf http://localhost:4173/ >/dev/null && break || sleep 2; done

      - name: Instalar navegadores Playwright
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Playwright — flujos críticos
        working-directory: frontend
        run: npm run test:e2e

  # ──────────────────────────────────────────────────────────────
  # Agent eval — Shadow mode quality gate (CTF-003)
  # Corre siempre en main/PR; filtra por paths para no bloquear
  # branches sin cambios en agentes.
  # Criterio de cierre: precision@1 >= 80% en reorden y cobranza.
  # ──────────────────────────────────────────────────────────────
  agent-eval:
    name: "Agent Eval — precision@1 ≥ 80% (CTF-003)"
    runs-on: ubuntu-latest

    # Sin postgres: los agentes usan fallback determinístico (sin BD).
    # Si en el futuro se agrega persistencia, añadir el service aquí.

    env:
      DJANGO_ENV: dev
      SECRET_KEY: "ci-only-dummy-key-not-used-in-prod-xK9mPqR2nL8vJ4wY"
      # Sin BD real: los eval tests no tocan la base de datos.
      # Declaramos las vars para que Django settings no falle al importar.
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_NAME: omni_erp
      DB_USER: omni_erp
      DB_PASSWORD: omni_erp_ci
      REDIS_URL: "redis://localhost:6379/0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        # requirements-dev incluye -r requirements.txt + pytest (movido fuera de prod).
        run: pip install -r requirements-dev.txt

      - name: Run eval suite (no-cov — umbral es precisión, no cobertura)
        working-directory: backend
        run: |
          python -m pytest tests_eval/ -v --tb=short --no-header \
            --no-cov
        # Criterio CTF-003: >= 80% precision@1 en reorden y cobranza.
        # El umbral se verifica dentro de los tests mismos
        # (test_precision_global / test_precision_global_prioridad /
        #  test_precision_global_canal). Si alguno falla, el job falla.

  # ──────────────────────────────────────────────────────────────
  # Security scan — INFRA-NEW-4: secret scanning + dependency audit
  # ──────────────────────────────────────────────────────────────
  security-scan:
    name: "Security scan (gitleaks + deps audit)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks necesita el historial completo

      - name: Secret scanning (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dependency audit (Python — pip-audit) — BLOQUEANTE
        working-directory: backend
        # BLOQUEANTE (Fase 5): requirements.txt quedó sin CVEs conocidos (deps de test
        # movidas a requirements-dev; cryptography/lxml/mcp/httpx actualizados). Un CVE
        # nuevo rompe el job a propósito → se remedia o se difiere con CTF fechado.
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Dependency audit (Node — npm audit) — BLOQUEANTE (high+)
        working-directory: frontend
        # BLOQUEANTE en HIGH (CTF-007 cerrado 2026-06-12): typescript-eslint
        # 8.61 eliminó la cadena fast-glob→micromatch→picomatch@2 y el árbol
        # quedó en 0 vulnerabilidades. Incluye devDependencies a propósito
        # (ver justificación en el job frontend).
        run: npm audit --audit-level=high

      - name: Trivy — CVEs de dependencias e imágenes (fs scan)
        # Instalación vía script oficial (evita depender de tags de la action).
        # Fase 5: BLOQUEANTE en CRITICAL (--exit-code 1); HIGH se reporta y se
        # escalará al cerrar los CVEs major pendientes (ratchet).
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          trivy fs --scanners vuln --severity HIGH --ignore-unfixed --no-progress . || true
          trivy fs --scanners vuln --severity CRITICAL --ignore-unfixed --no-progress --exit-code 1 .

  # ──────────────────────────────────────────────────────────────
  # Static analysis — plan "cero dudas" Fase 0/1
  # bandit (seguridad) bloqueante en MEDIUM+; ruff (lint); mypy (tipos, gradual)
  # ──────────────────────────────────────────────────────────────
  static-analysis:
    name: "Static analysis (bandit + semgrep + ruff + mypy)"
    runs-on: ubuntu-latest
    env:
      # mypy con django-stubs importa config.settings; necesita estas vars para
      # cargar settings (no se conecta a la BD, solo importa).
      DJANGO_ENV: dev
      SECRET_KEY: "ci-only-dummy-key-not-used-in-prod-xK9mPqR2nL8vJ4wY"
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_NAME: omni_erp
      DB_USER: omni_erp
      DB_PASSWORD: omni_erp_ci
      REDIS_URL: "redis://localhost:6379/0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev tooling
        working-directory: backend
        run: pip install bandit==1.9.4 ruff==0.8.4 mypy==1.13.0 semgrep==1.97.0

      - name: Bandit (seguridad estática — bloqueante en MEDIUM+)
        working-directory: backend
        run: bandit -r apps/ config/ -c .bandit.yaml --severity-level medium

      - name: Semgrep (OWASP/Django + reglas Omni — bloqueante en severidad ERROR)
        working-directory: backend
        # ../.semgrep.yml: reglas propias (raw SQL, verify=False, eval/exec, shell=True),
        # verificadas limpias (0 findings sobre 616 archivos) → bloqueantes.
        run: semgrep --config p/python --config p/django --config ../.semgrep.yml --severity ERROR --error apps/ config/

      - name: Ruff (bugs reales — BLOQUEANTE)
        working-directory: backend
        # Códigos que indican bugs, no estilo: sintaxis (E9), f-strings rotos (F63),
        # comparaciones inválidas (F7), nombres indefinidos (F82), uso antes de
        # asignación (F823) y redefiniciones (F811 — clases/funciones/imports
        # duplicados, como los serializers/ViewSet de finanzas en BUG-DUP-1). Este
        # subconjunto está limpio y bloquea para impedir regresiones.
        run: ruff check apps/ config/ --select E9,F63,F7,F82,F823,F811

      - name: Ruff (limpieza gradual — no bloqueante aún)
        working-directory: backend
        # F401 (imports sin usar): se limpia por fases; al quedar en cero, moverlo
        # al paso bloqueante de arriba.
        continue-on-error: true
        run: ruff check apps/ config/ --select F401

      - name: Mypy (tipos — django-stubs/drf — BLOQUEANTE en módulos de dinero)
        working-directory: backend
        # requirements-dev trae django-stubs/djangorestframework-stubs; la config del
        # plugin vive en setup.cfg [mypy]. Fase 5: con django-stubs el conteo bajó de
        # ~1368 a 0 en contabilidad/finanzas/nomina/manufactura → ahora BLOQUEANTE.
        run: |
          pip install -r requirements-dev.txt
          mypy apps/contabilidad apps/finanzas apps/nomina apps/manufactura

  # ──────────────────────────────────────────────────────────────
  # Contract — OpenAPI (drf-yasg) + schemathesis. BLOQUEANTE desde Fase 5:
  # genera el esquema y hace fuzzing de contrato contra un server vivo.
  # ──────────────────────────────────────────────────────────────
  contract:
    name: "Contract (OpenAPI + schemathesis)"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: omni_erp
          POSTGRES_USER: omni_erp
          POSTGRES_PASSWORD: omni_erp_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      # P2-4: el runserver del fuzzing usa Redis real para CACHES (DB 1);
      # el throttling DRF toca el cache en cada request del fuzzer.
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_NAME: omni_erp
      DB_USER: omni_erp
      DB_PASSWORD: omni_erp_ci
      DJANGO_ENV: dev
      SECRET_KEY: "ci-only-dummy-key-not-used-in-prod-xK9mPqR2nL8vJ4wY"
      REDIS_URL: "redis://localhost:6379/0"
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install deps
        working-directory: backend
        run: pip install -r requirements-dev.txt
      - name: Migrar
        working-directory: backend
        run: python manage.py migrate --noinput
      - name: Generar esquema OpenAPI (drf-yasg)
        working-directory: backend
        run: python manage.py generate_swagger /tmp/openapi.json -f json
      - name: Levantar servidor
        working-directory: backend
        run: |
          python manage.py runserver 0.0.0.0:8000 &
          for i in $(seq 1 30); do curl -sf http://localhost:8000/api/health/ >/dev/null && break || sleep 2; done
      - name: Schemathesis (fuzzing de contrato — BLOQUEANTE)
        working-directory: backend
        run: |
          schemathesis run /tmp/openapi.json --base-url http://localhost:8000 \
            --checks not_a_server_error --hypothesis-max-examples=5
